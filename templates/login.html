<!DOCTYPE html>
<html>
<head>
    <title>Login - Secure Cloud Log Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="card">

        <h1>Welcome Back</h1>
        <p>Sign in to continue</p>

        <form method="POST">

            <input type="text" name="username" placeholder="Username" required style="width:100%;padding:12px;margin:10px 0;border-radius:10px;border:1px solid #ddd;">

            <input type="password" name="password" placeholder="Password" required style="width:100%;padding:12px;margin:10px 0;border-radius:10px;border:1px solid #ddd;">

            <button type="submit">Sign In</button>

        </form>

        <p style="margin-top:15px;">
            Don't have an account?
            <a href="/register">Create Account</a>
        </p>

    </div>

</div>

</body>
</html>
