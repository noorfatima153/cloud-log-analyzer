<!DOCTYPE html>
<html>
<head>
    <title>Analysis History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <div class="navbar">
        <div class="brand">Cloud Log Analyzer</div>

        <div class="nav-links">
            <a href="/upload">Upload</a>
            <a href="/history">History</a>
            <a href="/logout">Logout</a>
        </div>
    </div>

    <h1>Analysis History</h1>

    <div class="card">

        {% if rows %}

        <table>

            <tr>
                <th>Filename</th>
                <th>Analyzed At</th>
                <th>Results</th>
            </tr>

            {% for row in rows %}

            <tr>

                <td>{{ row.filename }}</td>

                <td>{{ row.analyzed_at }}</td>

                <td>
                    <pre>{{ row.result }}</pre>
                </td>

            </tr>

            {% endfor %}

        </table>

        {% else %}

        <p>No analysis history available.</p>

        {% endif %}

    </div>

</div>

</body>
</html>
