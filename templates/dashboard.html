<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>Analytics Dashboard</h1>

    <div class="card">
        <table>
            <tr>
                <th>Metric</th>
                <th>Count</th>
            </tr>

            {% for key, value in data.items() %}
            <tr>
                <td>{{ key }}</td>
                <td>{{ value }}</td>
            </tr>
            {% endfor %}
        </table>

        <br>
        <a href="/upload">Upload Another</a>
    </div>
</div>

</body>
</html>
